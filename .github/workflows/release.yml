name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    name: Build macOS artifact
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Publish macOS arm64
        run: |
          dotnet publish \
            -c Release \
            -r osx-arm64 \
            --self-contained \
            -p:PublishSingleFile=true \
            -o artifacts/osx-arm64

      - name: Archive macOS artifact
        run: |
          cd artifacts
          zip -r TimeTracker-osx-arm64.zip osx-arm64

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: TimeTracker-osx-arm64
          path: artifacts/TimeTracker-osx-arm64.zip

  build-windows:
    name: Build Windows artifact
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Publish Windows x64
        run: |
          dotnet publish `
            -c Release `
            -r win-x64 `
            --self-contained `
            -p:PublishSingleFile=true `
            -o artifacts/win-x64

      - name: Archive Windows artifact
        shell: pwsh
        run: |
          Compress-Archive -Path artifacts/win-x64/* -DestinationPath artifacts/TimeTracker-win-x64.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: TimeTracker-win-x64
          path: artifacts/TimeTracker-win-x64.zip

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/TimeTracker-osx-arm64/TimeTracker-osx-arm64.zip
            artifacts/TimeTracker-win-x64/TimeTracker-win-x64.zip
