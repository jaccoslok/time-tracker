name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    name: Build macOS artifact
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Publish macOS arm64
        run: |
          dotnet publish \
            -c Release \
            -r osx-arm64 \
            --self-contained \
            -p:PublishSingleFile=true \
            -o artifacts/osx-arm64

      - name: Archive macOS artifact
        run: |
          cd artifacts
          zip -r TimeTracker-osx-arm64.zip osx-arm64

      - name: Upload macOS asset to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/TimeTracker-osx-arm64.zip
          append_body: true

  build-windows:
    name: Build Windows artifact
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Publish Windows x64
        run: |
          dotnet publish `
            -c Release `
            -r win-x64 `
            --self-contained `
            -p:PublishSingleFile=true `
            -o artifacts/win-x64

      - name: Archive Windows artifact
        shell: pwsh
        run: |
          Compress-Archive -Path artifacts/win-x64/* -DestinationPath artifacts/TimeTracker-win-x64.zip

      - name: Upload Windows asset to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/TimeTracker-win-x64.zip
          append_body: true
          generate_release_notes: true
